<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Interactive Kitchen - Classroom Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            text-transform: lowercase !important;
        }

        /* Large Fancy Bowl */
        .bowl-fancy {
            width: 650px;
            height: 300px;
            background: linear-gradient(180deg, rgba(255,255,255,0.7) 0%, rgba(210,230,255,0.9) 100%);
            border: 10px solid #64748b;
            border-radius: 20px 20px 280px 280px;
            box-shadow: 
                0 30px 60px rgba(0, 0, 0, 0.2),
                inset 0 -15px 30px rgba(255,255,255,0.5);
            position: relative;
            overflow: hidden; 
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 25px;
            z-index: 10;
        }

        #bowl-content-area {
            width: 85%;
            height: 75%;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-end;
            justify-content: center;
            gap: 12px;
            pointer-events: none;
        }

        .ingredient-in-bowl {
            font-size: 5rem;
            filter: drop-shadow(0 6px 4px rgba(0,0,0,0.3));
            animation: dropIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes dropIn {
            0% { transform: translateY(-200px) scale(0.5); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        .fs-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
        }

        #reset-overlay { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(50px); }
        #error-overlay { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(20px); }
        #success-overlay { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(40px); }
        #sequence-overlay { background: #f8fafc; padding: 2rem; justify-content: flex-start; }

        .big-icon { font-size: 18rem; }
        
        .glamorous-img {
            max-width: 90%;
            max-height: 50vh;
            border-radius: 50px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.4);
            animation: glamIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes glamIn {
            0% { transform: scale(0.6) translateY(100px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .num-circle {
            width: 80px;
            height: 80px;
            background: #2563eb;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 900;
        }

        /* Sequence Step Cards - Ultra Clear */
        .step-card {
            background: white;
            border: 5px dashed #cbd5e1;
            border-radius: 24px;
            padding: 15px 30px;
            width: 95%;
            max-width: 1400px;
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .step-slot {
            width: 180px;
            height: 70px;
            background: #f1f5f9;
            border: 4px solid #e2e8f0;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.8rem;
            color: #94a3b8;
            cursor: pointer;
            flex-shrink: 0;
        }
        .label-pill {
            background: #2563eb;
            color: white;
            padding: 12px 35px;
            border-radius: 60px;
            font-weight: 900;
            font-size: 2rem;
            cursor: pointer;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
        }
        .step-text { font-size: 1.8rem; font-weight: 700; color: #1e293b; text-align: left; line-height: 1.3; }
        
        .ingredient-text { color: #e11d48 !important; font-weight: 900; }
        .verb-highlight { color: #2563eb !important; font-weight: 900; }
        .cn-hint { font-size: 1.2rem; color: #64748b; font-weight: 600; margin-left: 4px; }

        .quantifier-img {
            width: 100px;
            height: 100px;
            object-fit: contain;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        * { text-transform: lowercase !important; }
    </style>
</head>
<body class="bg-slate-50 h-screen w-screen overflow-hidden flex flex-col font-sans select-none text-slate-800">

    <!-- Overlays -->
    <div id="reset-overlay" class="fs-overlay">
        <div class="big-icon animate-spin">🔃</div>
        <div class="text-6xl font-black mt-10 text-slate-600">cleaning kitchen...</div>
    </div>

    <div id="error-overlay" class="fs-overlay" onclick="this.style.display='none'">
        <div class="flex gap-10 mb-10">
            <div class="text-9xl animate-bounce">🚮</div>
            <div class="text-9xl animate-bounce" style="animation-delay: 0.1s">🗑️</div>
            <div class="text-9xl animate-bounce" style="animation-delay: 0.2s">❌</div>
        </div>
        <div class="text-8xl font-black text-white bg-red-600 px-10 py-5 rounded-3xl">wrong mix!</div>
        <div class="text-3xl font-bold mt-10 text-slate-300">tap to try again</div>
    </div>

    <div id="success-overlay" class="fs-overlay" onclick="this.style.display='none'">
        <div class="relative z-10 flex flex-col items-center justify-center w-full p-10">
            <img id="success-food-img" class="glamorous-img mb-10" src="" alt="food reward">
            <div id="success-message" class="text-4xl font-black text-slate-900 max-w-6xl leading-tight px-10 mb-6"></div>
            <div id="popcorn-bonus" class="text-3xl font-bold text-blue-600 italic hidden">enjoy it with a tub of popcorn!</div>
            <div class="text-2xl font-bold mt-8 text-amber-600 animate-pulse bg-amber-50 px-8 py-3 rounded-full border-4 border-amber-200">masterpiece! tap to close</div>
        </div>
    </div>

    <div id="sequence-overlay" class="fs-overlay">
        <h2 class="text-5xl font-black text-blue-600 mb-4">Step Matching Challenge!</h2>
        <p class="text-2xl text-slate-400 mb-8 font-bold">tap a blue label then tap a gray slot</p>
        <div id="sequence-labels" class="flex gap-6 mb-10 flex-wrap justify-center"></div>
        <div id="sequence-list" class="w-full flex flex-col items-center"></div>
        <button id="check-steps-btn" onclick="checkSequence()" class="mt-8 bg-green-600 text-white px-24 py-6 rounded-3xl text-5xl font-black shadow-2xl active:scale-95 transition-all">CHECK STEPS</button>
    </div>

    <!-- Main Header -->
    <header class="h-24 bg-white shadow-md flex items-center justify-between px-16 border-b-4 border-slate-200 shrink-0">
        <div class="flex flex-col">
            <h1 id="main-display" class="text-4xl font-black text-blue-600 tracking-tight">Kitchen Challenge</h1>
            <p id="sub-display" class="text-xl text-slate-500 font-bold italic">can you guess what we are making?</p>
        </div>
        <div class="bg-blue-600 text-white px-8 py-3 rounded-full font-black text-3xl shadow-lg">5 Secret Recipes</div>
    </header>

    <main id="game-container" class="flex flex-1 overflow-hidden">
        <!-- Play Area -->
        <div class="w-3/5 flex flex-col items-center justify-center p-10 relative bg-white">
            <div id="main-bowl" class="bowl-fancy transition-all duration-300">
                <div id="bowl-content-area"></div>
                <div id="bowl-empty-hint" class="absolute inset-0 flex items-center justify-center text-slate-300 font-black text-5xl pointer-events-none opacity-40">ADD INGREDIENTS</div>
            </div>
            
            <div class="mt-20 flex gap-8">
                <button onclick="triggerReset()" class="bg-slate-100 border-4 border-slate-300 text-slate-500 px-12 py-5 rounded-3xl text-3xl font-black shadow hover:bg-slate-200 active:scale-95 transition-all">reset</button>
                <button onclick="undoLastIngredient()" class="bg-white border-4 border-amber-400 text-amber-500 px-12 py-5 rounded-3xl text-3xl font-black shadow hover:bg-amber-50 active:scale-95 transition-all">undo ↩️</button>
                <button id="mix-button" onclick="checkMix()" class="bg-blue-600 hover:bg-blue-700 text-white px-24 py-5 rounded-3xl text-5xl font-black shadow-2xl active:scale-95 transition-all">MIX</button>
            </div>
        </div>

        <!-- Ingredient Shelf -->
        <div class="w-2/5 bg-slate-100 shadow-inner flex flex-col border-l-8 border-slate-200">
            <div class="p-6 bg-slate-200 border-b-4 border-slate-300 text-center">
                <h2 class="text-3xl font-black text-slate-700">ingredient shelf</h2>
            </div>
            <div id="ingredients-grid" class="flex-1 p-8 grid grid-cols-2 gap-6 overflow-y-auto no-scrollbar">
                <!-- Buttons added by JS -->
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div id="quantifier-modal" class="modal-overlay fixed inset-0 z-50 flex items-center justify-center hidden">
        <div class="bg-white rounded-[60px] p-12 max-w-6xl w-full shadow-[0_0_100px_rgba(0,0,0,0.3)] border-[12px] border-slate-100">
            <div class="text-center mb-10">
                <span id="modal-icon" class="text-9xl block mb-4"></span>
                <h3 id="modal-title" class="text-5xl font-black text-slate-900 mb-4">how much?</h3>
            </div>
            <div id="quantifier-grid" class="grid grid-cols-4 gap-6"></div>
            <button onclick="closeModal()" class="mt-12 w-full py-5 text-slate-400 text-3xl font-black hover:text-slate-600 transition-colors">go back</button>
        </div>
    </div>

    <script>
        const recipes = {
            "french toast": {
                ingredients: { bread: '2 slices of', milk: '1 glass of', egg: '1', salt: 'a little' },
                steps: [
                    { seq: "first", text: "<span class='verb-highlight'>mix</span><span class='cn-hint'>(混合)</span> <span class='ingredient-text'>one glass of milk</span>, <span class='ingredient-text'>one egg</span>, and <span class='ingredient-text'>a little salt</span>." },
                    { seq: "second", text: "<span class='verb-highlight'>dip</span><span class='cn-hint'>(沾)</span> <span class='ingredient-text'>two slices of bread</span> into the mix." },
                    { seq: "third", text: "<span class='verb-highlight'>fry</span><span class='cn-hint'>(煎)</span> the bread in a pan until it <span class='verb-highlight'>turns</span><span class='cn-hint'>(變成)</span> yummy." },
                    { seq: "last", text: "<span class='verb-highlight'>put</span><span class='cn-hint'>(放)</span> the toast on a plate and <span class='verb-highlight'>enjoy</span><span class='cn-hint'>(享受)</span> it!" }
                ],
                image: "https://docs.google.com/drawings/d/e/2PACX-1vRgbsgUlpnBjFUiHuZvq-vvbaJ_sKVFJxPOWlmgUSdSwL_l7uV3Wci0wymXP58_P3jSXwv_O5LvmC5_/pub?w=1440&h=1080"
            },
            "cupcakes": {
                ingredients: { flour: '1 bag of', oil: '1 cup of', sugar: 'some', egg: '1' },
                steps: [
                    { seq: "first", text: "<span class='verb-highlight'>mix</span><span class='cn-hint'>(混合)</span> <span class='ingredient-text'>one bag of flour</span>, <span class='ingredient-text'>one cup of oil</span>, and <span class='ingredient-text'>some sugar</span>." },
                    { seq: "second", text: "<span class='verb-highlight'>add</span><span class='cn-hint'>(加入)</span> <span class='ingredient-text'>one egg</span> and <span class='verb-highlight'>mix</span><span class='cn-hint'>(混合)</span> them together." },
                    { seq: "third", text: "<span class='verb-highlight'>pour</span><span class='cn-hint'>(倒)</span> the yummy mix into small cups." },
                    { seq: "last", text: "<span class='verb-highlight'>bake</span><span class='cn-hint'>(烤)</span> the cupcakes in the oven for 20 minutes." }
                ],
                image: "https://docs.google.com/drawings/d/e/2PACX-1vQw0L0Lrcf3iHo1jeRv5ih09FsE2eOjrieEW4L-ykc2TnG8JYLE9YtRlPTr_-I7hQEnMdX1_e8tGOd_/pub?w=1440&h=1080"
            },
            "brownies": {
                ingredients: { flour: '1 bowl of', butter: '1 can of', sugar: 'a lot of / much', chocolate: 'some' },
                steps: [
                    { seq: "first", text: "<span class='verb-highlight'>melt</span><span class='cn-hint'>(融化)</span> <span class='ingredient-text'>one can of butter</span> in a bowl." },
                    { seq: "second", text: "<span class='verb-highlight'>mix</span><span class='cn-hint'>(混合)</span> the butter with <span class='ingredient-text'>a lot of sugar</span> and <span class='ingredient-text'>some chocolate</span>." },
                    { seq: "third", text: "<span class='verb-highlight'>add</span><span class='cn-hint'>(加入)</span> <span class='ingredient-text'>one bowl of flour</span> and <span class='verb-highlight'>stir</span><span class='cn-hint'>(攪拌)</span> everything together." },
                    { seq: "last", text: "<span class='verb-highlight'>bake</span><span class='cn-hint'>(烤)</span> the brownies so they <span class='verb-highlight'>become</span><span class='cn-hint'>(變成)</span> a great snack." }
                ],
                image: "https://docs.google.com/drawings/d/e/2PACX-1vSOgr3s1lqSAJNXyNr7OD-ZDjSCwtMv4-CIbqcvyN24Hs5GsGBbt76eYZAbh2Ps2FaE2XdOLEgnwbnK/pub?w=1440&h=1080"
            },
            "apple pie": {
                ingredients: { apple: '2', flour: 'a lot of / much', sugar: 'a little', butter: '3 slices of' },
                steps: [
                    { seq: "first", text: "<span class='verb-highlight'>cut</span><span class='cn-hint'>(切)</span> <span class='ingredient-text'>two apples</span> into small pieces." },
                    { seq: "second", text: "<span class='verb-highlight'>mix</span><span class='cn-hint'>(混合)</span> the apples with <span class='ingredient-text'>much flour</span>, <span class='ingredient-text'>a little sugar</span> and <span class='ingredient-text'>three slices of butter</span>." },
                    { seq: "third", text: "<span class='verb-highlight'>put</span><span class='cn-hint'>(放)</span> the yummy mix into the pie crust (派皮)." },
                    { seq: "last", text: "<span class='verb-highlight'>bake</span><span class='cn-hint'>(烤)</span> the apple pie in the oven." }
                ],
                image: "https://docs.google.com/drawings/d/e/2PACX-1vQ9rGzD_b-1mhHYbmZyWvOw4bpNfsXhyS6siCeNkZxF1QAbImjJnfrM0v3vVgVsKM-FiKeb6VBHknDC/pub?w=1440&h=1080"
            },
            "pudding": {
                ingredients: { water: '1 bottle of', milk: '2 glasses of', egg: '2', sugar: 'some' },
                steps: [
                    { seq: "first", text: "<span class='verb-highlight'>mix</span><span class='cn-hint'>(混合)</span> <span class='ingredient-text'>one bottle of water</span>, <span class='ingredient-text'>two glasses of milk</span> and <span class='ingredient-text'>two eggs</span>." },
                    { seq: "second", text: "<span class='verb-highlight'>add</span><span class='cn-hint'>(加入)</span> <span class='ingredient-text'>some sugar</span> and <span class='verb-highlight'>stir</span><span class='cn-hint'>(攪拌)</span> the mix well." },
                    { seq: "third", text: "<span class='verb-highlight'>pour</span><span class='cn-hint'>(倒)</span> the mix into a small bowl." },
                    { seq: "last", text: "<span class='verb-highlight'>cook</span><span class='cn-hint'>(煮)</span> the pudding and <span class='verb-highlight'>wait</span><span class='cn-hint'>(等待)</span> for it to <span class='verb-highlight'>cool down</span><span class='cn-hint'>(冷卻)</span>." }
                ],
                image: "https://docs.google.com/drawings/d/e/2PACX-1vSBFjDouEmTqWlyrOnG_7EafnR82FLdMmwCCyv0xP4KjT130zHjFeEMrcawJ8BuYhYpdr8mhmfng9_Q/pub?w=1440&h=1080"
            }
        };

        const resultNames = { "french toast": "french toast", "cupcakes": "cupcakes", "brownies": "brownies", "apple pie": "an apple pie", "pudding": "pudding" };

        const ingredientsList = [
            { id: 'bread', icon: '🍞', type: 'uncountable' },
            { id: 'flour', icon: '🌾', type: 'uncountable' },
            { id: 'sugar', icon: '🍬', type: 'uncountable' },
            { id: 'salt', icon: '🧂', type: 'uncountable' },
            { id: 'milk', icon: '🥛', type: 'uncountable' },
            { id: 'butter', icon: '🧈', type: 'uncountable' },
            { id: 'oil', icon: '🥃', type: 'uncountable' },
            { id: 'water', icon: '💧', type: 'uncountable' },
            { id: 'chocolate', icon: '🍫', type: 'uncountable' },
            { id: 'egg', icon: '🥚', type: 'countable' },
            { id: 'apple', icon: '🍎', type: 'countable' }
        ];

        const qIcons = { 
            'slice': 'https://png.pngtree.com/png-vector/20240517/ourmid/pngtree-essential-features-of-a-high-quality-stainless-steel-kitchen-knife-comparing-png-image_12485923.png', 
            'bag': 'https://static.vecteezy.com/system/resources/previews/071/294/942/non_2x/empty-burlap-sack-isolated-on-transparent-background-png.png', 
            'glass': 'https://png.pngtree.com/png-clipart/20240701/original/pngtree-clear-shot-glasses-design-on-transparent-background-png-image_15464242.png', 
            'cup': 'https://static.vecteezy.com/system/resources/thumbnails/059/310/711/small/blank-paper-cup-on-black-background-disposable-drinkware-cut-out-transparent-png.png', 
            'bottle': 'https://png.pngtree.com/png-vector/20250325/ourmid/pngtree-water-bottle-png-image_15868794.png', 
            'tub': 'https://png.pngtree.com/png-clipart/20230806/original/pngtree-carton-bowl-empty-of-popcorn-vector-icon-fun-container-flat-vector-picture-image_10007311.png', 
            'bowl': 'https://www.pngall.com/wp-content/uploads/2018/05/Bowl-PNG-Image.png', 
            'can': 'https://static.vecteezy.com/system/resources/thumbnails/044/245/623/small/stack-of-metal-food-cans-with-pull-tab-on-top-png.png', 
            'a little': '🤏', 
            'some': '☁️', 
            'a lot of / much': '🌊' 
        };

        let bowlData = {}; let bowlRawData = []; let historyStack = []; let tempNumber = null;
        let activeDessert = null; let currentRecipeKey = null; let currentSelections = {};

        function init() {
            const grid = document.getElementById('ingredients-grid'); grid.innerHTML = '';
            ingredientsList.forEach(ing => {
                const btn = document.createElement('button');
                btn.className = "bg-white border-4 border-slate-200 rounded-[40px] p-6 flex items-center justify-center shadow hover:border-blue-500 hover:shadow-blue-200 transition-all active:scale-95";
                btn.onclick = () => openModal(ing);
                btn.innerHTML = `<span class="text-8xl">${ing.icon}</span>`;
                grid.appendChild(btn);
            });
        }

        function openModal(ing, stage = 'start') {
            const modal = document.getElementById('quantifier-modal'); const qGrid = document.getElementById('quantifier-grid');
            document.getElementById('modal-icon').innerText = ing.icon; modal.classList.remove('hidden'); qGrid.innerHTML = '';
            
            if (ing.type === 'countable') {
                document.getElementById('modal-title').innerText = `how many?`;
                ['1', '2', '3'].forEach(num => {
                    const card = createModalCard(num, '', ''); card.onclick = () => addToBowl(ing, num, num); qGrid.appendChild(card);
                });
            } else {
                if (stage === 'start') {
                    tempNumber = null; document.getElementById('modal-title').innerText = `how much?`;
                    ['1', '2', '3'].forEach(num => {
                        const card = createModalCard(num, '', ''); card.onclick = () => { tempNumber = num; openModal(ing, 'quantifier'); }; qGrid.appendChild(card);
                    });
                    ['a little', 'some', 'a lot of / much'].forEach(opt => {
                        const card = createModalCard('', opt, qIcons[opt]); card.onclick = () => addToBowl(ing, opt, opt); qGrid.appendChild(card);
                    });
                } else {
                    document.getElementById('modal-title').innerText = `pick a container`;
                    ['slice', 'bag', 'glass', 'cup', 'bottle', 'tub', 'bowl', 'can'].forEach(q => {
                        const card = createModalCard('', q, qIcons[q]);
                        card.onclick = () => {
                            let unit = (tempNumber > 1) ? (q === 'glass' ? 'glasses' : q + 's') : q;
                            const finalVal = `${tempNumber} ${unit} of`; addToBowl(ing, finalVal, finalVal);
                        };
                        qGrid.appendChild(card);
                    });
                }
            }
        }

        function createModalCard(numLabel, textLabel, contentSrc) {
            const card = document.createElement('button');
            card.className = "bg-white border-4 border-slate-200 rounded-[40px] p-6 flex flex-col items-center justify-center hover:border-blue-600 transition-all shadow-md active:scale-90";
            let content = "";
            if (numLabel) {
                content = `<div class="num-circle">${numLabel}</div>`;
            } else {
                if (contentSrc.startsWith('http')) {
                    content = `<img src="${contentSrc}" class="quantifier-img mb-2" alt="${textLabel}">`;
                } else {
                    content = `<span class="text-6xl mb-2">${contentSrc}</span>`;
                }
                if (['a little', 'some', 'a lot of / much'].includes(textLabel)) {
                    content += `<span class="text-xl font-black text-slate-800 mt-2">${textLabel}</span>`;
                }
            }
            card.innerHTML = content; return card;
        }

        function addToBowl(ing, value, display) {
            historyStack.push({ bowlData: JSON.parse(JSON.stringify(bowlData)), bowlRawData: [...bowlRawData], mainDisplayText: document.getElementById('main-display').innerText });
            const readable = ing.type === 'countable' ? `${value} ${ing.id}${value > 1 ? 's' : ''}` : `${display} ${ing.id}`;
            bowlData[ing.id] = value; bowlRawData.push(readable);
            document.getElementById('main-display').innerText = readable;
            document.getElementById('bowl-empty-hint').style.display = 'none';
            const area = document.getElementById('bowl-content-area'); const visual = document.createElement('div');
            visual.className = 'ingredient-in-bowl'; visual.innerText = ing.icon; area.appendChild(visual); closeModal();
            const bowl = document.getElementById('main-bowl'); bowl.classList.remove('success-bowl', 'error-bowl');
        }

        function undoLastIngredient() {
            if (historyStack.length === 0) return;
            const lastState = historyStack.pop();
            bowlData = lastState.bowlData; bowlRawData = lastState.bowlRawData;
            document.getElementById('main-display').innerText = lastState.mainDisplayText;
            const area = document.getElementById('bowl-content-area');
            if (area.lastChild) area.removeChild(area.lastChild);
            if (bowlRawData.length === 0) { document.getElementById('bowl-empty-hint').style.display = 'flex'; document.getElementById('main-display').innerText = "kitchen challenge"; }
        }

        function checkMix() {
            const bowlKeys = Object.keys(bowlData).filter(k => bowlData[k] !== undefined);
            if (bowlKeys.length === 0) return; let foundKey = null;
            for (const [name, recipe] of Object.entries(recipes)) {
                const recipeKeys = Object.keys(recipe.ingredients);
                if (recipeKeys.length === bowlKeys.length) {
                    let match = true;
                    for (const key of recipeKeys) { if (bowlData[key] !== recipe.ingredients[key]) { match = false; break; } }
                    if (match) { foundKey = name; break; }
                }
            }
            if (foundKey) { currentRecipeKey = foundKey; activeDessert = recipes[foundKey]; startSequencePhase(); } 
            else { document.getElementById('error-overlay').style.display = 'flex'; setTimeout(() => { document.getElementById('error-overlay').style.display = 'none'; }, 2500); }
        }

        function startSequencePhase() {
            const overlay = document.getElementById('sequence-overlay'); overlay.style.display = 'flex';
            const labelsContainer = document.getElementById('sequence-labels'); const listContainer = document.getElementById('sequence-list');
            labelsContainer.innerHTML = ''; listContainer.innerHTML = ''; currentSelections = {};
            const labels = ["first", "second", "third", "last"];
            labels.sort(() => Math.random() - 0.5).forEach((label, idx) => {
                const pill = document.createElement('div'); pill.className = "label-pill"; pill.innerText = label; pill.dataset.labelId = idx; pill.onclick = () => selectLabel(pill); labelsContainer.appendChild(pill);
            });
            const scrambledSteps = [...activeDessert.steps].sort(() => Math.random() - 0.5);
            scrambledSteps.forEach((step, idx) => {
                const card = document.createElement('div'); card.className = "step-card";
                card.innerHTML = `<div class="step-slot" onclick="handleSlotClick(this, ${idx})">tap slot</div><div class="step-text">${step.text}</div>`;
                card.dataset.correctSeq = step.seq; listContainer.appendChild(card);
            });
        }

        let currentlySelectedLabel = null;
        function selectLabel(el) { if (currentlySelectedLabel) currentlySelectedLabel.classList.remove('ring-8', 'ring-yellow-400'); currentlySelectedLabel = el; el.classList.add('ring-8', 'ring-yellow-400'); }

        function handleSlotClick(slot, idx) {
            if (slot.dataset.filledLabelId !== undefined) {
                const labelId = slot.dataset.filledLabelId; const originalPill = document.querySelector(`.label-pill[data-label-id="${labelId}"]`);
                if (originalPill) { originalPill.style.opacity = '1'; originalPill.style.pointerEvents = 'auto'; }
                slot.innerText = "tap slot"; slot.classList.remove('bg-blue-600', 'text-white'); delete slot.dataset.filledLabelId; delete currentSelections[idx];
            }
            if (currentlySelectedLabel) {
                slot.innerText = currentlySelectedLabel.innerText; slot.classList.add('bg-blue-600', 'text-white'); slot.dataset.filledLabelId = currentlySelectedLabel.dataset.labelId; currentSelections[idx] = currentlySelectedLabel.innerText; currentlySelectedLabel.style.opacity = '0.3'; currentlySelectedLabel.style.pointerEvents = 'none'; currentlySelectedLabel.classList.remove('ring-8', 'ring-yellow-400'); currentlySelectedLabel = null;
            }
        }

        function checkSequence() {
            const slots = document.querySelectorAll('.step-card'); let allCorrect = true;
            slots.forEach((card, idx) => {
                if (currentSelections[idx] !== card.dataset.correctSeq) { allCorrect = false; card.style.borderColor = "#ef4444"; } 
                else { card.style.borderColor = "#22c55e"; }
            });
            if (allCorrect) showFinalGlory();
            else setTimeout(() => { slots.forEach(card => card.style.borderColor = "#cbd5e1"); }, 2000);
        }

        function showFinalGlory() {
            document.getElementById('sequence-overlay').style.display = 'none';
            const overlay = document.getElementById('success-overlay');
            document.getElementById('success-food-img').src = activeDessert.image;
            let listStr = bowlRawData.join(", "); const lastComma = listStr.lastIndexOf(", ");
            if (lastComma !== -1) listStr = listStr.substring(0, lastComma) + " and " + listStr.substring(lastComma + 2);
            document.getElementById('success-message').innerText = `${listStr} turn into ${resultNames[currentRecipeKey]}!`;
            if (currentRecipeKey === "apple pie") document.getElementById('popcorn-bonus').classList.remove('hidden');
            overlay.style.display = 'flex';
        }

        function triggerReset() {
            const overlay = document.getElementById('reset-overlay'); overlay.style.display = 'flex';
            setTimeout(() => { resetBowlData(); overlay.style.display = 'none'; document.getElementById('sequence-overlay').style.display = 'none'; }, 1000);
        }

        function resetBowlData() {
            bowlData = {}; bowlRawData = []; historyStack = []; activeDessert = null; currentRecipeKey = null;
            document.getElementById('bowl-content-area').innerHTML = ''; document.getElementById('bowl-empty-hint').style.display = 'flex';
            document.getElementById('main-display').innerText = "kitchen challenge"; document.getElementById('popcorn-bonus').classList.add('hidden');
        }

        function closeModal() { document.getElementById('quantifier-modal').classList.add('hidden'); }
        window.onload = init;
    </script>
</body>
</html>
