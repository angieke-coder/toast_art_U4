<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gemini interactive kitchen - classroom challenge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* modern fancy bowl */
        .bowl-fancy {
            width: 500px;
            height: 240px;
            background: linear-gradient(180deg, rgba(255,255,255,0.6) 0%, rgba(220,230,245,0.8) 100%);
            border: 6px solid #94a3b8;
            border-radius: 15px 15px 200px 200px;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.25),
                inset 0 -15px 25px rgba(255,255,255,0.6);
            position: relative;
            overflow: hidden; 
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 20px;
            z-index: 10;
        }

        #bowl-content-area {
            width: 80%;
            height: 70%;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-end;
            justify-content: center;
            gap: 8px;
            pointer-events: none;
        }

        .ingredient-in-bowl {
            font-size: 3.5rem;
            filter: drop-shadow(0 4px 3px rgba(0,0,0,0.2));
            animation: dropIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes dropIn {
            0% { transform: translateY(-150px) scale(0.5); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        @keyframes success-glow {
            0%, 100% { box-shadow: 0 0 50px #fbbf24; border-color: #fbbf24; transform: scale(1); }
            50% { box-shadow: 0 0 100px #f59e0b; border-color: #f59e0b; transform: scale(1.05); }
        }
        .success-bowl { animation: success-glow 1s infinite; }

        @keyframes error-shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-20px); }
            40%, 80% { transform: translateX(20px); }
        }
        .error-bowl { animation: error-shake 0.4s ease-in-out; border-color: #ef4444; }

        .modal-overlay {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
        }

        /* full screen overlays */
        .fs-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: opacity 0.3s;
            text-align: center;
        }

        #reset-overlay { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(40px); }
        #error-overlay { background: rgba(239, 68, 68, 0.15); backdrop-filter: blur(20px); }
        #success-overlay { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(30px); }

        .big-icon { font-size: 15rem; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.2)); }
        
        .glamorous-img {
            max-width: 80%;
            max-height: 55vh;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            animation: glamIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes glamIn {
            0% { transform: scale(0.5) translateY(100px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .sparkle-bg {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, #fbbf24 2px, transparent 2px);
            background-size: 60px 60px;
            animation: moveSparkles 4s linear infinite;
            opacity: 0.2;
        }

        @keyframes moveSparkles {
            from { background-position: 0 0; }
            to { background-position: 120px 120px; }
        }

        .ingredient-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            touch-action: manipulation;
        }
        .ingredient-btn:active { transform: scale(0.92); }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* forced lowercase for everything */
        * { text-transform: lowercase !important; }

        /* circular number styling for cleaner UI */
        .num-circle {
            width: 60px;
            height: 60px;
            background: #3b82f6;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 900;
        }
    </style>
</head>
<body class="bg-slate-100 h-screen w-screen overflow-hidden flex flex-col font-sans select-none text-slate-800">

    <!-- reset overlay -->
    <div id="reset-overlay" class="fs-overlay">
        <div class="big-icon animate-spin">🔃</div>
        <div class="text-5xl font-black mt-8 text-slate-600">resetting the kitchen...</div>
    </div>

    <!-- error overlay -->
    <div id="error-overlay" class="fs-overlay" onclick="this.style.display='none'">
        <div class="flex gap-8 mb-8">
            <div class="big-icon animate-bounce">🚮</div>
            <div class="big-icon animate-bounce" style="animation-delay: 0.1s">🗑️</div>
            <div class="big-icon animate-bounce" style="animation-delay: 0.2s">❌</div>
        </div>
        <div class="flex gap-8">
            <div class="big-icon animate-pulse text-red-600">🥀</div>
            <div class="big-icon animate-pulse text-red-600" style="animation-delay: 0.3s">🚨</div>
        </div>
        <div class="text-6xl font-black mt-12 text-red-600">wrong mix! try again!</div>
        <div class="text-2xl font-bold mt-4 text-slate-500 underline">tap anywhere to go back</div>
    </div>

    <!-- success overlay -->
    <div id="success-overlay" class="fs-overlay" onclick="this.style.display='none'">
        <div class="sparkle-bg"></div>
        <div class="relative z-10 flex flex-col items-center justify-center w-full">
            <img id="success-food-img" class="glamorous-img mb-10" src="" alt="food reward">
            <div id="success-message" class="text-4xl font-black text-slate-800 max-w-5xl leading-tight px-10"></div>
            <div class="text-2xl font-bold mt-8 text-amber-600 animate-bounce">perfect work of art! tap to close!</div>
        </div>
    </div>

    <!-- header -->
    <header class="h-24 bg-white shadow-md flex items-center justify-between px-12 border-b-2 border-slate-200 shrink-0">
        <div class="flex flex-col">
            <h1 id="main-display" class="text-3xl font-black text-blue-600 leading-tight">kitchen challenge</h1>
            <p id="sub-display" class="text-md text-slate-500 font-bold italic">can the class guess what you are making?</p>
        </div>
        <div class="flex items-center gap-4">
            <div id="recipe-count-badge" class="bg-blue-100 text-blue-700 px-4 py-2 rounded-full font-black text-xl">
                5 secret recipes
            </div>
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden">
        <!-- left: bowl & controls -->
        <div class="w-7/12 flex flex-col items-center justify-center p-8 relative bg-slate-50">
            <div class="relative group">
                <div id="main-bowl" class="bowl-fancy transition-all duration-300">
                    <div id="bowl-content-area"></div>
                    <div id="bowl-empty-hint" class="absolute inset-0 flex items-center justify-center text-slate-300 font-black text-3xl pointer-events-none opacity-40">
                        add ingredients
                    </div>
                </div>
            </div>
            <div class="mt-16 flex gap-8">
                <button onclick="triggerReset()" class="bg-white border-4 border-slate-300 hover:bg-slate-50 text-slate-400 px-10 py-5 rounded-3xl text-2xl font-black shadow-lg active:scale-95 transition-all">
                    reset
                </button>
                <button id="mix-button" onclick="checkMix()" class="bg-blue-600 hover:bg-blue-700 text-white px-20 py-5 rounded-3xl text-3xl font-black shadow-2xl active:scale-95 transition-all">
                    mix
                </button>
            </div>
        </div>

        <!-- right: ingredient shelf -->
        <div class="w-5/12 bg-white shadow-2xl flex flex-col border-l-4 border-slate-200">
            <div class="p-6 bg-slate-50 border-b-2 border-slate-100 text-center">
                <h2 class="text-2xl font-black text-slate-700">ingredient shelf</h2>
            </div>
            <div id="ingredients-grid" class="flex-1 p-8 grid grid-cols-2 gap-6 overflow-y-auto no-scrollbar"></div>
        </div>
    </main>

    <!-- quantifier selector modal -->
    <div id="quantifier-modal" class="modal-overlay fixed inset-0 z-50 flex items-center justify-center hidden">
        <div class="bg-white rounded-[40px] p-10 max-w-5xl w-full shadow-2xl transform scale-100 border-8 border-slate-100">
            <div class="text-center mb-8">
                <span id="modal-icon" class="text-8xl block mb-4"></span>
                <h3 id="modal-title" class="text-4xl font-black text-slate-800">how much?</h3>
            </div>
            <div id="quantifier-grid" class="grid grid-cols-4 gap-4"></div>
            <button onclick="closeModal()" class="mt-10 w-full py-4 text-slate-400 text-xl font-bold hover:text-slate-600 transition-colors uppercase tracking-widest">
                go back
            </button>
        </div>
    </div>

    <script>
        // --- secret recipes & glamorous images ---
        const secretRecipes = {
            "french toast": { bread: '2 slices of', milk: '1 glass of', egg: '1', salt: 'a little' },
            "cupcakes": { flour: '1 bag of', oil: '1 cup of', sugar: 'some', egg: '1' },
            "brownies": { flour: '1 bowl of', butter: '1 can of', sugar: 'a lot of' },
            "apple pie": { apple: '2', flour: 'much', salt: 'a little' },
            "pudding": { milk: '1 bottle of', egg: '2', sugar: 'some' }
        };

        const dessertImages = {
            "french toast": "https://docs.google.com/drawings/d/e/2PACX-1vRgbsgUlpnBjFUiHuZvq-vvbaJ_sKVFJxPOWlmgUSdSwL_l7uV3Wci0wymXP58_P3jSXwv_O5LvmC5_/pub?w=1440&h=1080",
            "pudding": "https://docs.google.com/drawings/d/e/2PACX-1vSBFjDouEmTqWlyrOnG_7EafnR82FLdMmwCCyv0xP4KjT130zHjFeEMrcawJ8BuYhYpdr8mhmfng9_Q/pub?w=1440&h=1080",
            "apple pie": "https://docs.google.com/drawings/d/e/2PACX-1vQ9rGzD_b-1mhHYbmZyWvOw4bpNfsXhyS6siCeNkZxF1QAbImjJnfrM0v3vVgVsKM-FiKeb6VBHknDC/pub?w=1440&h=1080",
            "brownies": "https://docs.google.com/drawings/d/e/2PACX-1vSOgr3s1lqSAJNXyNr7OD-ZDjSCwtMv4-CIbqcvyN24Hs5GsGBbt76eYZAbh2Ps2FaE2XdOLEgnwbnK/pub?w=1440&h=1080",
            "cupcakes": "https://docs.google.com/drawings/d/e/2PACX-1vQw0L0Lrcf3iHo1jeRv5ih09FsE2eOjrieEW4L-ykc2TnG8JYLE9YtRlPTr_-I7hQEnMdX1_e8tGOd_/pub?w=1440&h=1080"
        };

        const ingredients = [
            { id: 'bread', label: 'bread', icon: '🍞', type: 'uncountable' },
            { id: 'flour', label: 'flour', icon: '🌾', type: 'uncountable' },
            { id: 'sugar', label: 'sugar', icon: '🍬', type: 'uncountable' },
            { id: 'salt', label: 'salt', icon: '🧂', type: 'uncountable' },
            { id: 'milk', label: 'milk', icon: '🥛', type: 'uncountable' },
            { id: 'butter', label: 'butter', icon: '🧈', type: 'uncountable' },
            { id: 'oil', label: 'oil', icon: '🥃', type: 'uncountable' },
            { id: 'cream_cheese', label: 'cheese', icon: '🧀', type: 'uncountable' },
            { id: 'egg', label: 'egg', icon: '🥚', type: 'countable' },
            { id: 'apple', label: 'apple', icon: '🍎', type: 'countable' }
        ];

        const qIcons = {
            'slice': '📏', 'bag': '💰', 'glass': '🥂', 'cup': '☕', 
            'bottle': '🍼', 'tub': '🍿', 'bowl': '🥣', 'can': '🥫', 
            'a little': '🤏', 'some': '☁️', 'a lot of': '🌊', 'much': '🌊'
        };

        const numbers = ['1', '2', '3'];
        const quantifiers = ['slice', 'bag', 'glass', 'cup', 'bottle', 'tub', 'bowl', 'can'];
        const indefinite = ['a little', 'some', 'a lot of', 'much'];

        let bowlData = {}; 
        let bowlRawData = []; 
        let tempNumber = null;

        function init() {
            const grid = document.getElementById('ingredients-grid');
            ingredients.forEach(ing => {
                const btn = document.createElement('button');
                btn.className = "ingredient-btn bg-slate-50 border-4 border-slate-200 rounded-[32px] p-8 flex flex-col items-center justify-center shadow-lg hover:border-blue-400 hover:shadow-blue-100 transition-all";
                btn.onclick = () => openModal(ing);
                btn.innerHTML = `<span class="text-7xl mb-4">${ing.icon}</span><span class="text-2xl font-black text-slate-700">${ing.label}</span>`;
                grid.appendChild(btn);
            });
        }

        function openModal(ing, stage = 'start') {
            const modal = document.getElementById('quantifier-modal');
            const qGrid = document.getElementById('quantifier-grid');
            document.getElementById('modal-icon').innerText = ing.icon;
            modal.classList.remove('hidden');
            qGrid.innerHTML = '';

            if (ing.type === 'countable') {
                document.getElementById('modal-title').innerText = `how many ${ing.label}s do you want?`;
                numbers.forEach(num => {
                    const card = createModalCard(num, '');
                    card.onclick = () => addToBowl(ing, num, num);
                    qGrid.appendChild(card);
                });
            } else {
                if (stage === 'start') {
                    tempNumber = null;
                    document.getElementById('modal-title').innerText = `how much ${ing.label} do you want?`;
                    numbers.forEach(num => {
                        const card = createModalCard(num, '');
                        card.onclick = () => { tempNumber = num; openModal(ing, 'quantifier'); };
                        qGrid.appendChild(card);
                    });
                    indefinite.forEach(opt => {
                        const card = createModalCard('', opt, qIcons[opt]);
                        card.onclick = () => addToBowl(ing, opt, opt);
                        qGrid.appendChild(card);
                    });
                } else {
                    document.getElementById('modal-title').innerText = `${tempNumber} ... of ${ing.label}?`;
                    quantifiers.forEach(q => {
                        const card = createModalCard('', q, qIcons[q]);
                        card.onclick = () => {
                            const val = `${tempNumber} ${q}${tempNumber > 1 ? 's' : ''} of`;
                            addToBowl(ing, val, val);
                        };
                        qGrid.appendChild(card);
                    });
                }
            }
        }

        function createModalCard(numLabel, textLabel, emojiIcon) {
            const card = document.createElement('button');
            card.className = "ingredient-btn bg-slate-50 border-4 border-slate-200 rounded-3xl p-4 flex flex-col items-center justify-center hover:border-blue-500 hover:bg-blue-50 transition-all";
            
            let content = "";
            if (numLabel) {
                content = `<div class="num-circle">${numLabel}</div>`;
            } else {
                content = `<span class="text-4xl mb-2">${emojiIcon}</span><span class="text-sm font-black text-slate-700 leading-tight">${textLabel}</span>`;
            }
            
            card.innerHTML = content;
            return card;
        }

        function addToBowl(ing, value, display) {
            const readable = ing.type === 'countable' ? `${value} ${ing.label}${value > 1 ? 's' : ''}` : `${display} ${ing.label}`;
            bowlData[ing.id] = value;
            bowlRawData.push(readable);

            document.getElementById('main-display').innerText = readable;
            document.getElementById('sub-display').innerText = "added!";
            document.getElementById('bowl-empty-hint').style.display = 'none';

            const area = document.getElementById('bowl-content-area');
            const visual = document.createElement('div');
            visual.className = 'ingredient-in-bowl';
            visual.innerText = ing.icon;
            area.appendChild(visual);
            closeModal();
            
            const bowl = document.getElementById('main-bowl');
            bowl.classList.remove('success-bowl', 'error-bowl');
            bowl.style.transform = "scale(1.02)";
            setTimeout(() => bowl.style.transform = "scale(1)", 100);
        }

        function checkMix() {
            const bowl = document.getElementById('main-bowl');
            const bowlKeys = Object.keys(bowlData).filter(k => bowlData[k] !== undefined);
            if (bowlKeys.length === 0) return;

            let foundDessert = null;
            for (const [name, recipe] of Object.entries(secretRecipes)) {
                const recipeKeys = Object.keys(recipe);
                if (recipeKeys.length === bowlKeys.length) {
                    let match = true;
                    for (const key of recipeKeys) {
                        if (bowlData[key] !== recipe[key]) { match = false; break; }
                    }
                    if (match) { foundDessert = name; break; }
                }
            }

            if (foundDessert) {
                let listStr = bowlRawData.join(", ");
                const lastComma = listStr.lastIndexOf(", ");
                if (lastComma !== -1) listStr = listStr.substring(0, lastComma) + " and " + listStr.substring(lastComma + 2);
                
                document.getElementById('success-food-img').src = dessertImages[foundDessert];
                document.getElementById('success-message').innerText = `${listStr} turn into a ${foundDessert}!`;
                document.getElementById('success-overlay').style.display = 'flex';
                bowl.classList.add('success-bowl');
            } else {
                document.getElementById('error-overlay').style.display = 'flex';
                bowl.classList.add('error-bowl');
                setTimeout(() => bowl.classList.remove('error-bowl'), 500);
            }
        }

        function triggerReset() {
            const overlay = document.getElementById('reset-overlay');
            overlay.style.display = 'flex';
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.opacity = '1', 10);
            setTimeout(() => {
                resetBowlData();
                overlay.style.opacity = '0';
                setTimeout(() => overlay.style.display = 'none', 300);
            }, 1200);
        }

        function resetBowlData() {
            bowlData = {}; bowlRawData = [];
            document.getElementById('bowl-content-area').innerHTML = '';
            document.getElementById('bowl-empty-hint').style.display = 'flex';
            document.getElementById('main-display').innerText = "kitchen challenge";
            document.getElementById('sub-display').innerText = "bowl emptied!";
            document.getElementById('main-bowl').classList.remove('success-bowl', 'error-bowl');
        }

        function closeModal() { document.getElementById('quantifier-modal').classList.add('hidden'); }
        init();
    </script>
</body>
</html>
